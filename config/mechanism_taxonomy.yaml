    },
    {
      "id": "tool-permission-leakage",
      "name": "Tool permission leakage",
      "summary": "A tool call exposes information outside the actor's needed scope.",
      "exemplar_surfaces": ["permission-boundary-kit", "tool-call"]
    },
    {
      "id": "eval-incentive",
      "name": "Eval incentive",
      "summary": "A scoring rule rewards reported success instead of observable behavior.",
      "exemplar_surfaces": ["eval-harness-lab", "grader-contract"]
    },
    {
      "id": "prompt-budget",
      "name": "Prompt budget",
      "summary": "The actor spending context is not the actor paying the opportunity cost.",
      "exemplar_surfaces": ["prompt-budget-ledger", "context-window"]
    }
  ]
