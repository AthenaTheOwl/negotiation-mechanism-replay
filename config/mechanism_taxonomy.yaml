    },
    {
      "id": "commitment-credibility",
      "name": "Commitment credibility",
      "summary": "A stated constraint matters only if the release rule is visible.",
      "exemplar_surfaces": ["prompt-budget-ledger", "capacity-hold"]
    },
    {
      "id": "winner's-curse",
      "name": "Winner's curse",
      "summary": "Winning can indicate the selected side priced the risk incorrectly.",
      "exemplar_surfaces": ["procurement-simulator", "bid-floor"]
    },
    {
      "id": "holdup",
      "name": "Holdup",
      "summary": "After a party is locked in, the other side can extract value.",
      "exemplar_surfaces": ["procurement-simulator", "switching-cost"]
    },
    {
      "id": "multi-agent-handoff",
      "name": "Multi-agent handoff",
